  process:
    heading: "Our Design & Construction Process"
    intro: >
      Every successful hardscape project begins with thoughtful planning and quality craftsmanship. Our proven design and construction process allows us to create beautiful outdoor spaces while ensuring every retaining wall, patio, walkway, and masonry feature performs as well as it looks. Throughout construction, we keep homeowners informed so there are no surprises along the way.
    steps:
      - title: Consultation & Design
        description: >
          We meet with you to discuss your goals, evaluate your property, understand how you plan to use the space, and develop a custom design that fits your vision and budget.
      - title: Site Preparation
        description: >
          Proper excavation, grading, drainage improvements, and compacted base preparation create the strong foundation required for long-lasting masonry and hardscape construction.
      - title: Professional Construction
        description: >
          Our experienced craftsmen carefully install every patio, retaining wall, walkway, fireplace, outdoor kitchen, and masonry feature using premium materials and proven installation methods.
      - title: Finishing Details
        description: >
          We complete final grading, joint finishing, edging, cleanup, and landscape integration to ensure the finished project blends naturally with the surrounding property.
      - title: Final Walkthrough
        description: >
          Before the project is complete, we inspect every detail with you to ensure the finished work meets our quality standards and exceeds your expectations.
  faq:
    heading: "Frequently Asked Questions"
    items:
      - question: What hardscape features do you build?
        answer: >
          We build patios, walkways, retaining walls, pool decks, outdoor kitchens,
          fireplaces, fire pits, stone steps, seating walls, veneer, and many
          other custom masonry features.
      - question: What materials do you use?
        answer: >
          We work with natural stone, concrete pavers, brick, granite, bluestone,
          manufactured wall systems, and other premium hardscape materials.
      - question: Do you provide custom designs?
        answer: >
          Yes. Every project is designed around your property, your goals, and
          your preferred materials.
      - question: Can hardscaping improve drainage?
        answer: >
          Absolutely. Proper grading, drainage planning, and retaining wall
          construction are incorporated into many of our projects.
      - question: Do you serve residential and commercial properties?
        answer: >
          Yes. We provide masonry and hardscape services for homeowners,
          businesses, HOAs, and commercial properties throughout Massachusetts.

      - question: How much does a paver patio cost in Massachusetts?
        answer: >
          The cost of a paver patio depends on its size, the materials you
          choose, site conditions, drainage requirements, and custom features
          such as fire pits, seating walls, or outdoor kitchens. Every project
          is different, so we provide a detailed estimate based on your property,
          design goals, and budget.

      - question: Should I choose natural stone or concrete pavers?
        answer: >
          Both materials offer excellent durability and appearance. Natural stone
          provides a timeless, one-of-a-kind look with unique color variations,
          while concrete pavers offer a wide variety of styles, colors, and
          patterns at a lower cost. We'll help you select the best option based
          on your home's architecture, maintenance preferences, and budget.

      - question: How long does a retaining wall last?
        answer: >
          A professionally constructed retaining wall can last for decades when
          it is built with proper drainage, a solid foundation, and quality
          materials. Our retaining walls are designed to withstand New England's
          freeze-thaw cycles while providing long-term structural support and
          enhancing the appearance of your landscape.

      - question: Can you build around an existing pool?
        answer: >
          Yes. We regularly design and build pool decks, patios, walkways,
          retaining walls, outdoor kitchens, and seating areas around existing
          swimming pools. Every project is carefully planned to improve safety,
          drainage, accessibility, and the overall outdoor living experience.

      - question: Do patios increase home value?
        answer: >
          A professionally designed patio can increase your home's value while
          making your outdoor space more functional and enjoyable. Features such
          as natural stone patios, outdoor fireplaces, kitchens, and walkways
          are attractive to many homebuyers and can improve curb appeal as well
          as everyday living.

      - question: How long does construction take?
        answer: >
          Construction time depends on the size and complexity of the project.
          Smaller patios may take only a few days, while complete outdoor living
          spaces with retaining walls, kitchens, lighting, and multiple hardscape
          features can take several weeks. Before work begins, we'll provide a
          project schedule so you know what to expect.



