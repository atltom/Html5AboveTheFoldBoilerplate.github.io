      - title: "Steps & Stairways"
        anchor: steps-stairways
        image:
          src: "/images/small/stone-arched-stairwell-gloucester-mass.webp"
          alt: "Custom natural stone steps and arched stairway constructed by S. Phaneuf & Associates in Massachusetts."
        paragraphs:
          - >
            Custom stone steps and stairways do a lot more than just help you walk up and down a sloped yard. They add a grand, elegant look to your property and make navigating steep hills completely safe and comfortable. Whether you need a welcoming set of wide granite steps at your front door or a rugged natural stone stairway cutting through a tiered backyard, a professionally built set of steps acts as a beautiful, functional backbone for your landscape. At S. Phaneuf & Associates, we design and build heavy-duty stone steps and stairways that connect your outdoor spaces beautifully.
          - >
            Building stairs that stay safe and level over time is one of the toughest challenges in masonry. If the groundwork isn't done correctly, New England's brutal winter ground frost will easily tilt, sink, or separate the heavy stone blocks, creating dangerous tripping hazards. We construct our steps on deep, heavily packed gravel bases or reinforced concrete footings to stop any ground movement. Every step is carefully pitched at a micro-angle so rainwater drains right off the surface instead of pooling and turning into dangerous sheet ice during Massachusetts winters.
          - >
            Your new steps can be crafted from massive, solid stone blocks for a rugged look, or built with brick and paver rises topped with smooth bluestone treads. Many homeowners choose to build stone stairways right into their retaining walls or run them smoothly alongside sloped walkways and pool patios. We will work with you to calculate the perfect step height and width, ensuring your new staircase is incredibly easy to climb while matching the existing architecture of your home.
        features:
          heading: "Popular Step & Stairway Options"
          items:
            - Solid granite block steps
            - Bluestone tread stairways
            - Fieldstone and natural stone steps
            - Brick and paver step risers
            - Retaining wall integrated steps
            - Front entryway step upgrades
            - Tiered backyard staircases
            - Integrated step and riser lighting
            - Custom stone landings and transitions
            - Curved and arched stone stairways
        benefits:
          heading: "Benefits of Custom Steps & Stairways"
          items:
            - Makes steep slopes and hilly yards safe and easy to navigate.
            - Instantly lifts your front yard's curb appeal and home value.
            - Engineered with built-in drainage to prevent winter ice build-up.
            - Connects multi-level yards, patios, and pool decks into one clean layout.
