      - title: "Stone Veneer & Siding"
        anchor: stone-veneer
        image:
          src: "/images/small/gas-lanterns-concord-mass.webp"
          alt: "Custom natural stone veneer siding and retaining wall accents completed by S. Phaneuf & Associates in Massachusetts."
        paragraphs:
          - >
            Stone veneer is a fantastic way to give your home, foundation, or outdoor features the gorgeous look of solid stone without the massive weight and high cost of traditional stone building. Veneer consists of carefully cut pieces of real natural stone or high-quality engineered stone that are permanently bonded to a backing wall. At S. Phaneuf & Associates, we use premium stone veneer to transform plain concrete foundations, home entryways, chimney stacks, and outdoor living features into beautiful, high-end works of art.
          - >
            Installing stone veneer correctly requires incredible attention to detail and professional masonry skills. Because Massachusetts gets heavy rain, snow, and extreme freezing winters, protecting the wall behind the stone is critical. If water creeps behind the veneer and freezes, it will expand and pop the stones right off the wall. We use advanced moisture barriers, metal wire lath, and heavy-duty bonding mortars to guarantee a completely waterproof seal that keeps your stone veneer locked in place and looking flawless for decades.
          - >
            Stone veneer is incredibly versatile and can be used on both the inside and outside of your home. Outside, it is perfect for covering up ugly concrete foundations, framing a front door entryway, or dressing up the sides of an outdoor kitchen or fireplace. Inside, many homeowners use it to build breathtaking floor-to-ceiling indoor fireplace surrounds or accent walls. We offer a huge variety of stone styles—including classic New England fieldstone, sleek ledgestone, and traditional granite—to match your exact design goals.
        features:
          heading: "Popular Stone Veneer Options"
          items:
            - Real natural stone veneer
            - Lightweight cultured stone veneer
            - Classic New England fieldstone style
            - Clean, modern ledgestone patterns
            - Concrete foundation masking
            - Chimney and fireplace facing
            - Outdoor kitchen stone wrapping
            - Front door entryway accents
            - Custom stone pillar and column wraps
            - Multi-color granite and quartz blends
        benefits:
          heading: "Benefits of Custom Stone Veneer"
          items:
            - Instantly upgrades the appearance of plain wood or concrete surfaces.
            - Dramatically boosts your home's curb appeal and resale market value.
            - Provides the exact look and texture of solid stone at a lower cost.
            - Adds a extra layer of durable, weather-proof protection to walls.
            - Never fades, peels, or rots like wood siding or vinyl vinyl.
            - Lightweight design allows it to be installed on almost any wall structure.
            - Needs zero painting or regular maintenance once installed.
            - Engineered with premium mortars to survive harsh MA winter weather.
        closing:
          - >
            We install every stone veneer project with the care and precision of master craftsmen. We believe that adding the timeless look of stone completely elevates the style and character of your property.
          - >
            If you want to transform your Massachusetts home or backyard with custom stone veneer siding, our skilled team will help you choose the perfect style to create a stunning, lasting finish.
      - title: "Pools & Pool Decks"
        anchor: pool-decks
