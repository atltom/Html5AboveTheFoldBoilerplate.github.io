      - title: "Fire Pits"
        anchor: fire-pits
        image:
          src: "/images/small/gas-firepit-concord-mass.webp"
          alt: "Custom rectangular gas fire pit and stone patio built by S. Phaneuf & Associates in Concord, Massachusetts."
        paragraphs:
          - >
            A custom stone fire pit is the perfect gathering spot for family and friends to hang out, roast marshmallows, and stay warm on cool Massachusetts nights. Unlike a portable metal fire bowl that rusts out over time, a built-in masonry fire pit adds permanent style, safety, and value to your backyard. At S. Phaneuf & Associates, we design and construct both traditional wood-burning fire pits and modern gas-burning features that look great in any yard.
          - >
            Building a durable fire pit takes correct masonry skills and the right heat-safe materials. Standard stones can crack or explode under intense heat, so we line every fire pit with thick, specialized firebrick and heat-resistant mortar. Just like our patios, we build every fire pit on a deeply packed gravel base to ensure that New England’s winter ground frost doesn’t cause the stonework to shift, tilt, or pull apart over the years.
          - >
            Your fire pit can be shaped as a classic circle, a clean modern square, or a sleek rectangle depending on your patio's style. Many homeowners like to add built-in stone seating walls around the fire pit to create a permanent, comfortable conversation zone. Whether you want it built right into the middle of your main patio or set up as a separate destination in a quiet corner of your yard, we will help you create a cozy outdoor retreat.
        features:
