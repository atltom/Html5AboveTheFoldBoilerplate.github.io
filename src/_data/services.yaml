masonry:
  benefits:
    heading: Why Invest in Professional Hardscaping?
    intro: >
          A professionally designed hardscape does much more than improve the appearance of your home. Well-built patios, walkways, retaining walls, outdoor kitchens, fireplaces, and fire features create functional outdoor living spaces while increasing property value and reducing long-term maintenance. Quality construction also protects your investment by ensuring every feature is built to perform through New England's changing weather.
    items:
      - title: Increase Property Value
        description: >
          Professionally installed patios, walkways, retaining walls, and outdoor living spaces improve curb appeal while adding lasting value that homeowners can enjoy for many years.
      - title: Expand Your Outdoor Living Space
        description: >
          Extend your home's usable living area with custom patios, outdoor kitchens, fireplaces, seating areas, and gathering spaces designed for relaxing, entertaining, and spending time with family and friends.
      - title: Built for New England Weather
        description: >
          Proper excavation, grading, drainage, and quality base preparation help every installation withstand freeze-thaw cycles, heavy use, and changing seasonal conditions.
      - title: Designed Specifically for Your Property
        description: >
          Every hardscape is custom designed around your home's architecture, existing landscape, elevation changes, and the way you want to use your outdoor space.
      - title: Low Maintenance & Long Lasting
        description: >
          Natural stone, concrete pavers, and quality masonry materials provide decades of beauty while requiring very little maintenance compared to many traditional landscape features.
  services:
    heading: "Our Masonry & Hardscape Services"
    intro: >
      We design and build beautiful outdoor living spaces for homes throughout Massachusetts.
    items:
      - title: Patio Construction
        anchor: patios
        image:
          src: /images/small/pool-and-spa-wellesley-mass.webp
          alt: Custom natural stone pool patio and spa constructed by S. Phaneuf & Associates in Wellesley, Massachusetts.
        paragraphs:
          - >
            A great patio is the foundation of a backyard you can enjoy all year long in Massachusetts. Whether you want a quiet place to relax, an outdoor dining area, or a big space to host family and friends, a custom patio adds beauty and value to your home. At S. Phaneuf & Associates, we design and build natural stone, bluestone, and paver patios that fit your lifestyle and property perfectly.
          - >
            Every patio we build starts with the right groundwork. We carefully check the slopes, soil layout, and drainage before any digging begins. Having a deep, solid base is the most important part of building a long-lasting patio, especially with New England's harsh freeze-thaw winter cycles. By combining great materials with smart construction steps, we make patios that stay level and beautiful for decades.
          - >
            Your new patio can stand alone or connect with other outdoor projects like retaining walls, outdoor kitchens, fire pits, and pool decks. Whether you are fixing up an old backyard or starting fresh, we will help you design a space that looks great with your home, gives you a beautiful place to hang out, and boosts your property value.
        features:
          heading: Popular Patio Features
          items:
            - Natural stone patios
            - Bluestone patios
            - Concrete paver patios
            - Outdoor dining spaces
            - Poolside patios
            - Built-in seating walls
            - Backyard landscape lighting
            - Backyard drainage solutions
            - Extended patio spaces
            - Custom stone borders
        benefits:
          heading: Benefits of Custom Patio Construction
          items:
            - Gives you more usable outdoor space to hang out and host events.
            - Makes your home look amazing and increases its overall value.
            - Offers a tough, low-maintenance surface that lasts for years.
            - Matches your house style and your surrounding yard cleanly.
            - Creates a comfortable gathering spot for friends and family.
            - Stand up easily to unpredictable Massachusetts weather.
            - Connects smoothly with outdoor kitchens, fireplaces, and pools.
            - Extends your living space right out into your backyard.
        closing:
          - >
            From small backyard setups to massive entertainment spaces, we design every project around your property and your long-term goals. We believe a beautiful yard should feel like a natural part of your home, not an afterthought.
          - >
            If you are thinking about adding a custom patio to your Massachusetts home, our skilled team will guide you through every step of the design and building process.
      - title: "Retaining Walls"
        anchor: retaining-walls
        image:
