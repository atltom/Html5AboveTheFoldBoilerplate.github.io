masonry:

  projects:
  - title: Luxury Outdoor Living Space with Pool, Patio & Outdoor Kitchen
    location: Wellesley, MA
    summary: >
      This Wellesley backyard was transformed into a custom outdoor living
      space designed for entertaining, relaxing, and making the most of the
      property throughout every season. Natural stone hardscaping, custom
      masonry, and outdoor gathering areas work together to create a beautiful,
      functional landscape that complements the home.
    features:
      - Bluestone Patio
      - Bluestone Walkways
      - Custom Outdoor Kitchen
      - Stacked Stone Retaining Walls
      - Raised Planting Beds
      - Masonry Fireplace
    homeownerGoals: >
      The homeowners wanted to turn their backyard into an inviting outdoor
      living space where family and friends could gather for meals,
      conversation, and relaxation. They also wanted a design that blended
      naturally with their home's architecture while providing long-lasting,
      low-maintenance materials.
    whatWeBuilt: >
      Our team installed bluestone walkways, a spacious natural stone patio,
      stacked stone retaining walls, raised planting beds, a custom outdoor
      kitchen, and a wood-burning masonry fireplace. Every feature was planned
      with proper grading, drainage, and quality craftsmanship to withstand
      New England's changing weather while creating a cohesive outdoor
      environment.
    completedResult: >
      The finished landscape gives the homeowners several comfortable spaces
      for outdoor dining, entertaining, and relaxing. The project also
      improves curb appeal, increases the property's functionality, and adds
      lasting value while creating an outdoor living space the family can
      enjoy for many years.
